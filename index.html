<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef1f4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="食记">
  <link rel="manifest" href="manifest.json?v=13">
  <link rel="stylesheet" href="styles.css?v=13">
  <title>食记</title>
</head>
<body>
  <main id="app" class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">MEAL JOURNAL</p>
        <h1 id="month-title">食记</h1>
      </div>
      <button class="icon-btn" id="settings-button" type="button" aria-label="设置" data-tooltip="设置">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="m19.4 15 .1.1a1.8 1.8 0 0 1-2.5 2.5l-.1-.1a1.8 1.8 0 0 0-3.1 1.3v.2a1.8 1.8 0 0 1-3.6 0v-.2a1.8 1.8 0 0 0-3.1-1.3l-.1.1a1.8 1.8 0 1 1-2.5-2.5l.1-.1A1.8 1.8 0 0 0 3.3 12a1.8 1.8 0 0 0-1.3-3.1h-.2a1.8 1.8 0 0 1 0-3.6H2a1.8 1.8 0 0 0 1.3-3.1l-.1-.1A1.8 1.8 0 1 1 5.7-.4l.1.1A1.8 1.8 0 0 0 8.9-1.6V-2a1.8 1.8 0 0 1 3.6 0v.2a1.8 1.8 0 0 0 3.1 1.3l.1-.1a1.8 1.8 0 1 1 2.5 2.5l-.1.1A1.8 1.8 0 0 0 19.4 5h.2a1.8 1.8 0 0 1 0 3.6h-.2a1.8 1.8 0 0 0 0 6.4Z" transform="translate(1.5 1.5) scale(.875)"/></svg>
      </button>
    </header>

    <div class="month-nav" aria-label="月份切换">
      <button class="text-btn" id="previous-month" type="button">上个月</button>
      <button class="today-btn" id="today-button" type="button">回到今天</button>
      <button class="text-btn" id="next-month" type="button">下个月</button>
    </div>

    <section id="timeline" aria-live="polite"></section>

    <button class="floating-add" id="floating-add" type="button" aria-label="添加饮食记录" data-tooltip="添加饮食记录">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </main>

  <dialog id="entry-dialog">
    <form method="dialog" id="entry-form" class="entry-form">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">NEW ENTRY</p>
          <h2>记一餐</h2>
        </div>
        <button class="icon-btn ghost" id="close-dialog" type="button" aria-label="关闭">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>

      <div class="photo-picker" id="photo-picker">
        <img id="photo-preview" alt="待添加的食物照片" hidden>
        <span id="photo-placeholder">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h4l1.5-2h5L16 5h4v14H4V5Z"/><circle cx="12" cy="12" r="3.5"/></svg>
          添加食物照片
        </span>
      </div>
      <div class="photo-actions" aria-label="选择照片来源">
        <button class="btn btn-ghost" id="take-photo" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h3l1.5-2h7L17 7h3v12H4V7Z"/><circle cx="12" cy="13" r="3.5"/></svg>
          拍照
        </button>
        <button class="btn btn-ghost" id="choose-photo" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9" r="1.5"/><path d="m4 17 4-4 3 3 3-4 6 5"/></svg>
          从相册选择
        </button>
      </div>
      <input id="camera-input" type="file" accept="image/*" capture="environment">
      <input id="album-input" type="file" accept="image/*">

      <label class="field-label" for="entry-name">食物描述</label>
      <input class="field" id="entry-name" type="text" placeholder="例如：鸡胸肉沙拉" required maxlength="40">

      <label class="field-label" for="entry-calories">热量</label>
      <div class="unit-field"><input class="field" id="entry-calories" type="number" min="1" max="9999" inputmode="numeric" placeholder="0" required><span>kcal</span></div>

      <fieldset>
        <legend class="field-label">餐次</legend>
        <div class="meal-select" id="meal-select">
          <label><input type="radio" name="meal" value="breakfast" checked><span>早</span></label>
          <label><input type="radio" name="meal" value="lunch"><span>中</span></label>
          <label><input type="radio" name="meal" value="dinner"><span>晚</span></label>
        </div>
      </fieldset>

      <label class="field-label" for="entry-time">时间</label>
      <input class="field" id="entry-time" type="datetime-local" required>
      <button class="btn btn-primary btn-block" id="save-entry" type="submit">保存记录</button>
      <button class="btn btn-ghost btn-block" id="delete-entry" type="button" hidden>删除记录</button>
      <p id="form-error" class="form-error" role="alert"></p>
    </form>
  </dialog>

  <dialog id="settings-dialog">
    <form method="dialog" class="entry-form" id="settings-form">
      <div class="dialog-head"><div><p class="eyebrow">PREFERENCES</p><h2>设置</h2></div><button class="icon-btn ghost" type="button" data-close-settings aria-label="关闭"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18"/></svg></button></div>
      <label class="field-label" for="goal-input">每日热量目标</label>
      <div class="unit-field"><input class="field" id="goal-input" type="number" min="500" max="9999" step="50"><span>kcal</span></div>
      <button class="btn btn-primary btn-block" type="submit">保存目标</button>
      <button class="btn btn-ghost btn-block" id="clear-data" type="button">清空全部记录</button>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=13').then((registration) => {
        registration.waiting?.postMessage('SKIP_WAITING');
        registration.update();
      }).catch(() => {});
    }
  </script>
  <script src="app.js?v=13"></script>
</body>
</html>
